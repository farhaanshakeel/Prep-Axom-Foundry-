<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Members — The Prep Axiom Foundry</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <!-- page-only styles -->
  <style>
    .page-wrap {
      min-height: 100vh;
      padding: 100px 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .members-note {
      margin-bottom: 40px;
      padding: 12px 18px;

      font-size: 13px;
      line-height: 1.6;
      color: var(--grey);

      border-left: 2px solid #f0c040;
      background: rgba(240, 192, 64, 0.05);
    }

    .members-note strong {
      color: #f0c040;
    }

    .members-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;

      margin-bottom: 48px;
    }

    .mstat {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mstat-num {
      font-family: "Orbitron", sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: #f0c040;
    }

    .mstat-label {
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--grey);
    }

    .members-section-label {
      display: flex;
      align-items: center;
      gap: 16px;

      margin: 40px 0 20px;

      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--grey);
    }

    .members-section-label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(0, 170, 255, 0.1);
    }

    .members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }

    .member-card {
      position: relative;
      padding: 18px 20px;

      background: rgba(3, 13, 26, 0.8);
      border: 1px solid rgba(0, 170, 255, 0.12);

      transition: 0.3s ease;

      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 0 100%);
    }

    .member-card:hover {
      transform: translateY(-3px);
      border-color: rgba(0, 170, 255, 0.35);
      background: rgba(0, 170, 255, 0.04);
    }

    .member-card.gold {
      border-color: rgba(240, 192, 64, 0.3);
      background: rgba(240, 192, 64, 0.04);
    }

    .member-card.gold:hover {
      border-color: rgba(240, 192, 64, 0.6);
    }

    .member-num {
      position: absolute;
      top: 10px;
      right: 12px;

      font-family: "Share Tech Mono", monospace;
      font-size: 9px;
      color: rgba(240, 192, 64, 0.3);
    }

    .member-badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 3px 8px;

      border: 1px solid;

      font-family: "Share Tech Mono", monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .badge-gold {
      color: #f0c040;
      border-color: rgba(240, 192, 64, 0.4);
      background: rgba(240, 192, 64, 0.08);
    }

    .badge-blue {
      color: var(--blue);
      border-color: rgba(0, 170, 255, 0.3);
      background: rgba(0, 170, 255, 0.06);
    }

    .member-name {
      margin-bottom: 5px;

      font-family: "Orbitron", sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--white);
    }

    .member-info {
      font-family: "Share Tech Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--grey);
    }

    .open-spots {
      margin-top: 40px;
      padding: 40px;

      text-align: center;

      font-family: "Share Tech Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--grey);

      border: 1px dashed rgba(0, 170, 255, 0.12);
    }

    .open-spots a {
      color: var(--blue);
      text-decoration: none;
    }

    .open-spots a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .page-wrap {
        padding: 80px 24px 40px;
      }

      .members-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>
